<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="form-container">
        <form action="#" method="POST">
            <h2>Contact Us</h2>
            <label for="name">Name:
                <input type="text" id="name" name="name" pattern="[A-Za-z\s]+" placeholder="Ex. Dan" required >
            </label>

            <label for="email">Email:
                <input type="email" id="email" name="email" placeholder="Dan@company.com" required>
            </label>

            <label for="message">Message:
                <textarea name="message" id="message" placeholder="I love coding really" minlength="10" maxlength="120" required></textarea>
            </label>

            <button type="submit">Submit</button>
        </form>
    </div>
</body>

</html>
