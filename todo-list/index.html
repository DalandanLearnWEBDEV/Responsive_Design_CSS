<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <ul class="todo-list">
        <h1>My To-Do List</h1>
        <!--For first section task-->
        <li class="">
            <input type="checkbox" id="first-task">
            <label for="first-task">Full Stack Development</label>
            <ul class="sub-item">
                <li>
                    <a href="#" class="sub-item-link" target="_blank">Learn CSS</a>
                </li>
            </ul>
        </li>
        <!--For second section task-->
        <li>
            <input type="checkbox" id="second-task">
            <label for="second-task">YouTube Automation (YTA)</label>
            <ul class="sub-item">
                <li>
                    <a href="#" class="sub-item-link" target="_blank">Upload 1 video</a>
                </li>
            </ul>
        </li>
        <!-- For third section task -->
        <li>
            <input type="checkbox" id="first-task">
            <label for="first-task">Read Bible</label>
            <ul class="sub-item">
                <li>
                    <a href="#" class="sub-item-link" target="_blank">Read 1-3 Chapter</a>
                </li>
            </ul>
        </li>
        <!-- For fourth section task -->
        <li>
            <input type="checkbox" id="first-task">
            <label for="first-task">Whop Clipping</label>
            <ul class="sub-item">
                <li>
                    <a href="#" class="sub-item-link" target="_blank">Submit 1 video</a>
                </li>
            </ul>
        </li>
        
    </ul>
</body>

</html>
