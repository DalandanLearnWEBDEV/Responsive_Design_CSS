<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selection Feature Page</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Feature Selection</h1>
    <div class="feature-card-container">
        <label class="feature-card" for="storage">
            <input id="storage" type="checkbox">
            <h3 class="description">Cloud Storage</h3>
            <p class="description">100 Gigabyte secure storage</p>
        </label>

        <label class="feature-card" for="support">
            <input id="support" type="checkbox">
            <h3 class="description">Dedicated Support</h3>
            <p class="description">24/7 customer help</p>
        </label>

        <label class="feature-card" for="analytics">
            <input id="analytics" type="checkbox">
            <h3 class="description">Advanced Analytics</h3>
            <p class="description">Insights & reports</p>
        </label>

        <label class="feature-card" for="themes">
            <input id="themes" type="checkbox">
            <h3 class="description">Custom User Themes</h3>
            <p class="description">Personalize dashboard design</p>
        </label>

        <label class="feature-card" for="collab">
            <input id="collab" type="checkbox">
            <h3 class="description">Multi-user Collab</h3>
            <p class="description">Team access and sharing</p>
        </label>

        <label class="feature-card" for="api">
            <input id="api" type="checkbox">
            <h3 class="description">API Access</h3>
            <p class="description">Integrate with your custom built tools</p>
        </label>
    </div>
</body>
</html>
