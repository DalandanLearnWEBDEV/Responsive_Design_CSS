<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Settings Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="settings-card"> 
        <h1>Game Settings</h1>
        <label for="sound">
            <input id="sound" type="checkbox">
            Sound Effects
        </label>

        <label for="music">
            <input id="music" type="checkbox">
            Background Music
        </label>

        <label for="mode">
            <input id="mode" type="checkbox">
            Hard Mode
        </label>

        <label for="feedback">
            <input id="feedback" type="checkbox">
            Haptic Feedback
        </label>
    </div>
</body>
</html>
